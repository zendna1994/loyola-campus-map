<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Loyola Campus Map | ZEN-DNA</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Welcome</h2>
  <select id="role">
    <option>Student</option>
    <option>Staff</option>
    <option>HOD</option>
  </select>
  <input type="text" id="username" placeholder="Enter Name"/>
  <button onclick="login()">Enter</button>
</div>

<!-- HEADER -->
<div id="header">
  <div class="title">LOYOLA COLLEGE (AUTONOMOUS), CHENNAI - 600034</div>
  <div class="subtitle">College Campus Map</div>
</div>

<div id="map"></div>

<!-- CONTROLS -->
<div id="controls">
  <button onclick="locateUser()">📍 Locate Me</button>
  <button onclick="findNearest('toilet')">🚻 Toilet</button>
  <button onclick="findNearest('water')">💧 Water</button>
  <button onclick="startVoice()">🎤 Voice</button>

  <!-- FLOOR -->
  <select onchange="filterFloor(this.value)">
    <option value="all">All Floors</option>
    <option value="ground">Ground</option>
    <option value="1">1st Floor</option>
    <option value="2">2nd Floor</option>
  </select>

  <button id="audioBtn">🔊 ON</button>
</div>

<audio id="anthem" loop>
  <source src="https://zendna1994.github.io/loyola-campus-map/Loyola%20Anthem.mp3">
</audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="map.js"></script>

</body>
</html>
