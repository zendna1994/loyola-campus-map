<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Loyola Campus Map | ZEN-DNA</title>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/e98a4d_b935ab57540b41bdb320efa88b5e69b1~mv2.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="header">
    LOYOLA COLLEGE (AUTONOMOUS), CHENNAI - 600034
    <div class="sub">Campus Map</div>
  </div>

  <input id="search" autocomplete="off" placeholder="Search department, hall, facility...">

  <div id="map"></div>

  <div id="fab" onclick="toggleMenu()">☰</div>

  <div id="menu">
    <button onclick="locateUser()">📍 Locate Me</button>
    
    <div style="display: flex; gap: 5px;">
      <button onclick="nearest('toilet')" style="flex:1;">🚻 Toilet</button>
      <button onclick="nearest('water')" style="flex:1;">💧 Water</button>
    </div>

    <button id="audioBtn" onclick="toggleAudio()" style="background:#D4A64A; color:#23365D; font-weight:700;">🔊 Audio ON</button>

    <select id="buildingFilter"></select>
    
    <select id="floorFilter">
      <option value="all">All Floors</option>
      <option value="ground">Ground Floor</option>
      <option value="1">1st Floor</option>
      <option value="2">2nd Floor</option>
      <option value="3">3rd Floor</option>
      <option value="4">4th Floor</option>
    </select>
  </div>

  <audio id="audio" loop src="assets/audio/loyola-anthem.mp3"></audio>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="data/config.js"></script>
  <script src="map.js"></script>

</body>
</html>
