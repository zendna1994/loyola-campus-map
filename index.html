<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Loyola Campus Map</title>
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/e98a4d_b935ab57540b41bdb320efa88b5e69b1~mv2.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="header">
    LOYOLA COLLEGE (AUTONOMOUS), CHENNAI - 600034
    <div class="sub">Campus Digital Map</div>
  </div>

  <div id="search-wrapper">
    <div id="search-container">
      <input id="search" autocomplete="off" placeholder="Search Dept, Room, or Unit..." oninput="showSuggestions()">
      <div id="help-inline" onclick="openHelpWizard()">
        <span class="help-icon">💡</span>
        <span class="help-text">HELP</span>
      </div>
    </div>
    <div id="suggestions-box"></div>
  </div>

  <div id="route-panel">
    <div id="route-stats">Calculating...</div>
    <button onclick="clearNavigation()" class="cancel-btn">STOP NAVIGATION</button>
  </div>

  <div id="map"></div>

  <div id="fab" onclick="toggleMenu()">☰</div>

  <div id="menu">
    <div class="menu-title">Campus Explorer</div>
    
    <div class="filter-label">Advanced Filters</div>
    <select id="advFilter" class="zen-select">
      <option value="all">All Categories</option>
      <optgroup label="Academic Schools" id="filter-schools"></optgroup>
      <optgroup label="Facilities" id="filter-cats"></optgroup>
    </select>

    <div style="display:flex; gap:5px; margin-top:10px;">
      <button onclick="nearest('toilet')" style="flex:1;">🚻 Toilet</button>
      <button onclick="nearest('water')" style="flex:1;">💧 Water</button>
    </div>
    
    <button id="audioBtn" onclick="toggleAudio()" class="menu-btn gold-btn">🔊 Audio ON</button>
  </div>

  <audio id="audio" loop src="assets/audio/loyola-anthem.mp3"></audio>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="data/config.js"></script>
  <script src="map.js"></script>

</body>
</html>
